name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Test, lint, and build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: false

      - name: Set up Python
        run: uv python install 3.11

      - name: Create environment
        run: uv venv --python 3.11

      - name: Install package and dev tools
        run: uv pip install --python .venv/bin/python -e ".[dev]"

      - name: Seed offline business-card skill fixture
        run: |
          mkdir -p "$HOME/.codex/shared/skills/business-card-to-contact/scripts"
          cat > "$HOME/.codex/shared/skills/business-card-to-contact/scripts/run_business_card_pipeline.py" <<'PY'
          from __future__ import annotations

          import json
          import sys
          from pathlib import Path

          _image_path = Path(sys.argv[1])
          artifact_dir = Path(sys.argv[2])
          artifact_dir.mkdir(parents=True, exist_ok=True)
          (artifact_dir / "spec.json").write_text(
              json.dumps(
                  {
                      "full_name": "CI Fixture",
                      "organization": "Example Organization",
                      "email": "ci.fixture@example.test",
                  },
                  sort_keys=True,
              )
              + "\n",
              encoding="utf-8",
          )
          (artifact_dir / "review.md").write_text("# CI fixture review\n", encoding="utf-8")
          PY

      - name: Run tests
        run: .venv/bin/python -m pytest -q

      - name: Run ruff
        run: .venv/bin/ruff check .

      - name: Build package
        run: uv build --out-dir dist

  gitleaks:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            zricethezav/gitleaks:v8.30.1 \
            detect --source=/repo --no-banner --redact --exit-code 1
